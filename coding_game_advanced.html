<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Coding Quest - เวอร์ชั่นคลิกคำสั่ง</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Comic Sans MS', 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .container { background: #fff9e6; border-radius: 30px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 30px; max-width: 900px; width: 100%; border: 5px solid #FFD700; }
        .header { text-align: center; margin-bottom: 20px; }
        .game-info { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .info-item { background: #667eea; color: white; padding: 10px; border-radius: 15px; text-align: center; flex: 1; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .game-canvas { background: white; border-radius: 15px; aspect-ratio: 1; display: grid; grid-template-columns: repeat(7, 1fr); border: 2px solid #667eea; }
        .grid-cell { border: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; }
        
        /* Programming Styles */
        .block-palette { background: white; border-radius: 10px; padding: 10px; border: 2px solid #764ba2; margin-bottom: 10px; }
        .block { background: #667eea; color: white; padding: 10px; border-radius: 8px; cursor: pointer; display: inline-block; margin: 5px; font-weight: bold; }
        .block:hover { background: #764ba2; }
        .program-area { background: #f9f9f9; border-radius: 10px; padding: 10px; min-height: 100px; border: 2px dashed #764ba2; }
        .program-item { background: #667eea; color: white; padding: 5px 10px; border-radius: 5px; margin: 5px; display: inline-block; }

        /* Manual Controls */
        .btn-direction { width: 50px; height: 50px; font-size: 20px; cursor: pointer; border-radius: 10px; }
        
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🎮 CODING QUEST</h1></div>
    
    <div class="main-content">
        <div class="game-section">
            <div class="game-canvas" id="gameCanvas"></div>
        </div>

        <div class="programming-section">
            <div class="control-label">🧩 คลิกเพื่อเพิ่มคำสั่ง</div>
            <div class="block-palette">
                <div class="block" onclick="addProgramBlock('up')">⬆ ขึ้น</div>
                <div class="block" onclick="addProgramBlock('down')">⬇ ลง</div>
                <div class="block" onclick="addProgramBlock('left')">⬅ ซ้าย</div>
                <div class="block" onclick="addProgramBlock('right')">➡ ขวา</div>
            </div>

            <div class="control-label">📋 ลำดับคำสั่ง</div>
            <div class="program-area" id="programArea"></div>
            
            <button onclick="runProgram()" style="margin-top:10px; padding:10px; width:100%;">▶ Run</button>
            <button onclick="clearProgram()" style="margin-top:5px; padding:10px; width:100%;">🗑️ Clear</button>
        </div>
    </div>
</div>

<script>
    let gameState = { programMoves: [], playerPos: {x:0, y:0} };

    // ฟังก์ชันเพิ่มคำสั่งโดยการคลิก
    function addProgramBlock(command) {
        gameState.programMoves.push(command);
        renderProgramArea();
    }

    // ฟังก์ชันแสดงคำสั่งในกล่อง
    function renderProgramArea() {
        const area = document.getElementById('programArea');
        area.innerHTML = '';
        gameState.programMoves.forEach((cmd, index) => {
            const item = document.createElement('div');
            item.className = 'program-item';
            item.textContent = cmd;
            item.onclick = () => removeProgramBlock(index);
            area.appendChild(item);
        });
    }

    function removeProgramBlock(index) {
        gameState.programMoves.splice(index, 1);
        renderProgramArea();
    }

    function clearProgram() {
        gameState.programMoves = [];
        renderProgramArea();
    }

    function runProgram() {
        alert("กำลังรันคำสั่ง: " + gameState.programMoves.join(", "));
    }
    
    // หมายเหตุ: ระบบ Swipe ถูกตัดออกโดยไม่มีโค้ดจัดการ touchstart/touchend ในส่วนลากนิ้วแล้ว
</script>

</body>
</html>
